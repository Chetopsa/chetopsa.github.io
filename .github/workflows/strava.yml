name: Update Strava Activity

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:      # allow manual run

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest activity
        run: |
          # Refresh access token
          TOKEN_RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }})

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')

          # Get latest activity
          ACTIVITY=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.strava.com/api/v3/athlete/activities?per_page=1")

          ACTIVITY_ID=$(echo $ACTIVITY | jq -r '.[0].id')
          NAME=$(echo $ACTIVITY | jq -r '.[0].name')
          DISTANCE=$(echo $ACTIVITY | jq -r '.[0].distance')
          MOVING_TIME=$(echo $ACTIVITY | jq -r '.[0].moving_time')
          DATE=$(echo $ACTIVITY | jq -r '.[0].start_date_local')

          echo "{
            \"id\": $ACTIVITY_ID,
            \"name\": \"$NAME\",
            \"distance\": $DISTANCE,
            \"moving_time\": $MOVING_TIME,
            \"date\": \"$DATE\"
          }" > latest.json

          # Get old activity ID if file exists
          if [ -f latest.json ]; then
            OLD_ID=$(git show HEAD:latest.json 2>/dev/null | jq -r '.id' || echo "")
          else
            OLD_ID=""
          fi

          # Only proceed if activity changed
          if [ "$ACTIVITY_ID" != "$OLD_ID" ]; then
            echo "NEW_ACTIVITY=true" >> $GITHUB_ENV
          else
            echo "NEW_ACTIVITY=false" >> $GITHUB_ENV
          fi

      - name: Commit changes
        if: env.NEW_ACTIVITY == 'true'
        run: |
          git config user.name "g125150503+Chetopsa@users.noreply.github.com"
          git config user.email "Chetopsa"
          git add latest.json
          git commit -m "Update latest Strava activity"
          git push

      - name: Trigger deploy workflow
        if: env.NEW_ACTIVITY == 'true'
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'